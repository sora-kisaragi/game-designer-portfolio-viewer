services:
  app:
    build: .
    ports:
      - "3010:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/portfolio.db
      - UPLOAD_DIR=/app/data/uploads
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    restart: unless-stopped
